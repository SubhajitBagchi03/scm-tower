services:
  # 1. FastAPI Backend
  - type: web
    name: scm-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./scm_db.db
      - key: GROQ_API_KEY
        sync: false # You will enter this manually in the Render dashboard

  # 2. Next.js Frontend
  - type: web
    name: scm-frontend
    env: node
    rootDir: scm_frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: scm-backend
          type: web
          property: url
